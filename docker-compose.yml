version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: interviewace-backend
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env
    restart: unless-stopped
    networks:
      - interviewace-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: interviewace-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - interviewace-network

networks:
  interviewace-network:
    driver: bridge
